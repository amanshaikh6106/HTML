<!DOCTYPE html>
<html>
<head>
  <title>Doctor Appointment Form</title>
</head>
<body>

  <h1>City Hospital</h1>

  <hr>

  <form>

    <b>Patient Name:</b>
    <br>
    <input type="text" placeholder="Enter your full name">
    <br><br>

    <b>Email Address:</b>
    <br>
    <input type="email" placeholder="Enter your email">
    <br><br>

    <b>Age:</b>
    <br>
    <input type="number" placeholder="Enter your age">
    <br><br>

    <b>Gender:</b>
    <br>
    <input type="radio" name="gender" value="male"> Male &nbsp;
    <input type="radio" name="gender" value="female"> Female &nbsp;
    <input type="radio" name="gender" value="other"> Other
    <br><br>

    <b>Choose Doctor:</b>
    <br>
    <select>
      <option value="">-- Select Doctor --</option>
      <option>Dr. Anil Sharma — General Physician</option>
      <option>Dr. Priya Mehta — Cardiologist</option>
      <option>Dr. Ravi Kumar — Dermatologist</option>
      <option>Dr. Sneha Joshi — Pediatrician</option>
      <option>Dr. Arjun Patel — Orthopedic</option>
      <option>Dr. Kavita Rao — Neurologist</option>
    </select>
    <br><br>

    <b>Appointment Date:</b>
    <br>
    <input type="date">
    <br><br>

    <b>Appointment Time:</b>
    <input type="time">
    <br><br>

    <b>Describe Symptoms / Health Issues:</b>
    <br>
    <textarea rows="5" cols="40" placeholder="Write your symptoms here..."></textarea>
    <br><br>

    <input type="submit" value="Book Appointment">
    &nbsp;
    <input type="reset" value="Reset">

  </form>

</body>
</html>
