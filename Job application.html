<!DOCTYPE html>
<html>
<head>
  <title>Job Application Form</title>
</head>
<body>

  <h1>Job Application Form</h1>
  <h2>Software Company</h2>

  <hr>

  <form>

    <b>Full Name:</b>
    <br>
    <input type="text" placeholder="Enter your full name">
    <br><br>

    <b>Email Address:</b>
    <br>
    <input type="email" placeholder="Enter your email">
    <br><br>

    <b>Mobile Number:</b>
    <br>
    <input type="text" placeholder="Enter your mobile number">
    <br><br>

    <b>Position Applying For:</b>
    <br>
    <select>
      <option value="">-- Select Position --</option>
      <option>Frontend Developer</option>
      <option>Backend Developer</option>
      <option>Full-Stack Developer</option>
      <option>ML Engineer</option>
      <option>DevOps Engineer</option>
      <option>UI/UX Designer</option>
      <option>Product Manager</option>
    </select>
    <br><br>

    <b>Experience Level:</b>
    <br>
    <select>
      <option value="">-- Select Experience --</option>
      <option>Intern (No experience)</option>
      <option>Junior (0-2 years)</option>
      <option>Mid-level (2-5 years)</option>
      <option>Senior (5-8 years)</option>
      <option>Staff / Lead (8+ years)</option>
    </select>
    <br><br>

    <b>Technical Skills:</b>
    <br>
    <input type="checkbox"> JavaScript &nbsp;
    <input type="checkbox"> Python &nbsp;
    <input type="checkbox"> HTML &nbsp;
    <input type="checkbox"> SQL &nbsp;
    <br><br>

    <b>Upload Resume:</b>
    <br>
    <input type="file" accept=".pdf,.doc,.docx">
    <br><br>

    <b>Cover Letter:</b>
    <br>
    <textarea rows="5" cols="40" placeholder="Write why you want this job..."></textarea>
    <br><br>

    <input type="submit" value="Submit Application">
    &nbsp;
    <input type="reset" value="Reset">

  </form>

</body>
</html>
