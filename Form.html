<!DOCTYPE html>
<html>
<head>
  <title>Picnic Form</title>
</head>
<body>

  <h1><b>Picnic Registration Form</b></h1>

  <hr>

  <form>
    <p><strong>Your Name:</strong></p>
    <input type="text" placeholder="Enter your name">
    <br><br>


    <p><strong>Your Age:</strong></p>
    <input type="number" placeholder="Enter your age">
    <br><br>

    
    <p><strong>Gender:</strong></p>
    Male   <input type="radio" name="gender" value="male">
    Female <input type="radio" name="gender" value="female">
    <br><br>


    <p><strong>Phone Number:</strong></p>
    <input type="text" placeholder="Enter your phone number">
    <br><br>

    
    <p><strong>Email Address:</strong></p>
    <input type="email" placeholder="Enter your email">
    <br><br>

    
    <p><strong>Select Picnic Location:</strong></p>
    <select>
      <option>-- Select Location --</option>
      <option>Lonavala</option>
      <option>Matheran</option>
      <option>Alibaug</option>
      <option>Mahabaleshwar</option>
    </select>
    <br><br>

    
    <p><strong>Picnic Date:</strong></p>
    <input type="date">
    <br><br>

    
    <p><strong>Food Preference:</strong></p>
    Veg   <input type="checkbox" value="veg">
    Non-Veg <input type="checkbox" value="nonveg">
    Snacks  <input type="checkbox" value="snacks">
    <br><br>

    
    
    <input type="submit">
    
    
  </form>


</body>
</html>
