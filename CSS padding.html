<!DOCTYPE html>
<html>
   <head>
      <title>CSS padding</title>
      <style>
        .box1{
              border: 3px solid green;
              padding: 20px;
              margin-bottom: 20px;
        }
        .box2{
            
              border: 3px dotted blue;
              padding-top: 20px;
              padding-left: 40px;
              padding-right: 60px;
        }
        </style>
    </head>
    <body>
      <div class="box1">
    this box has equal padding on all sides
</div>
<div class="box2">
    MY NAME IS AMAN
</div>



</body>
</html>
